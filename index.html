<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Kelly Services Internal Network</title>
<style>
body{margin:0;background:#0b1220;color:#eaf4ee;font-family:Segoe UI,Arial;display:flex;align-items:center;justify-content:center;height:100vh}
.box{width:min(760px,92%);background:#111a2b;border:1px solid #2b3d52;border-radius:14px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
h1{color:#00B140}.bar{height:18px;background:#223;border-radius:9px;overflow:hidden}.fill{height:100%;width:0;background:#00B140;animation:l 4s forwards}@keyframes l{to{width:100%}}
#portal{display:none;text-align:center}img{max-width:280px;border-radius:16px;border:5px solid #00B140}.badge{display:inline-block;background:#00B140;color:#fff;padding:8px 14px;border-radius:20px;font-weight:bold}
.small{color:#b8c5d6}
</style></head><body><div class='box'>
<div id='loading'><h1>Kelly Services Internal Network</h1><div class='small' id='status'>Initializing secure connection...</div><br><div class='bar'><div class='fill'></div></div></div>
<div id='portal'>
<div class='badge'>🏆 ACHIEVEMENT UNLOCKED</div>
<h1>Curious Employee</h1>
<p>You found the hidden employee portal.</p>
<img src='nala.jpg'><h2>Chief Morale Officer: Nala</h2>
<p><em>"Always greet people like they just got home."</em></p>
<p class='small'>Morale has increased by <b>+10</b>. You may now return to work... eventually.</p>
</div></div>
<script>
const msgs=["Checking employee badge...","Verifying orientation status...","Checking attendance record...","Evaluating curiosity...","Consulting Chief Morale Officer...","ACCESS GRANTED"];
let i=0,s=document.getElementById('status');
let iv=setInterval(()=>{if(i<msgs.length)s.textContent=msgs[i++];},650);
setTimeout(()=>{clearInterval(iv);loading.style.display='none';portal.style.display='block';document.body.style.background='#0f1a12';},4000);
</script></body></html>
