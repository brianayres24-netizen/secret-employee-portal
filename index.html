<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Secret Employee Portal</title>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#0f1720;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.card{width:min(700px,90%);text-align:center}
.bar{height:20px;background:#333;border-radius:10px;overflow:hidden;margin:20px 0}
.fill{height:100%;width:0;background:#00B140;animation:load 3s forwards}
@keyframes load{to{width:100%}}
#portal{display:none} img{max-width:280px;border-radius:16px;border:4px solid #00B140}
button{padding:10px 18px;border:none;border-radius:8px;background:#00B140;color:white;cursor:pointer}
</style></head><body>
<div class="card">
<div id="loading">
<h1>Kelly Services Internal Network</h1>
<p id="status">Establishing secure connection...</p>
<div class="bar"><div class="fill"></div></div>
</div>
<div id="portal">
<h1>🏆 Achievement Unlocked!</h1>
<h2>Curious Employee</h2>
<p>You actually scanned the QR code.</p>
<img src="nala.jpg" alt="Nala"><h3>Chief Morale Officer</h3>
<p><em>"Always greet people like they just got home."</em></p>
<button onclick="alert('Morale increased by +10!')">Pet Nala 🐶</button>
</div></div>
<script>
const msgs=["Checking badge credentials...","Verifying curiosity level...","Consulting Chief Morale Officer...","Access Granted!"];
let i=0;let s=document.getElementById('status');
let t=setInterval(()=>{if(i<msgs.length)s.textContent=msgs[i++];},700);
setTimeout(()=>{clearInterval(t);loading.style.display='none';portal.style.display='block';},3000);
</script></body></html>
